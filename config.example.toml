[paths]
video_source = "./videos"
raw_data = "./raw-data"
vault = "./vault"

[discover]
video_extensions = [".mp4", ".mov", ".mkv"]
max_depth = 8

[transcription]
engine = "mlx-whisper"
model = "mlx-community/whisper-medium"
language = "ru"

[llm]
provider = "openai"
model = "gpt-5.4-mini"

[chunking]
chunk_minutes = 10
overlap_seconds = 120
