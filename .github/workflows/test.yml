name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest -q
      - run: media-to-wiki-convertor --help
      - run: |
          tmp_project="$(mktemp -d)/project"
          media-to-wiki-convertor init "$tmp_project"
          cd "$tmp_project"
          media-to-wiki-convertor status
          media-to-wiki-convertor healthcheck
          media-to-wiki-convertor run --dry-run

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m pip install dist/*.whl
      - run: media-to-wiki-convertor --help
